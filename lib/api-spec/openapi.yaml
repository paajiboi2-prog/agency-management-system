            type: string
      responses:
        "204":
          description: Deleted

  /quotations/{id}/convert-to-invoice:
    post:
      operationId: convertQuotationToInvoice
      tags: [quotations]
      summary: Convert quotation to invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "201":
          description: Invoice created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      summary: List proposals
      responses:
        "200":
