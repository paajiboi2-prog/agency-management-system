components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    ReferenceLink:
      type: object
      required:
        - label
        - url
      properties:
        label:
          type: string
        url:
          type: string

    ClientCalendarShareInput:
      type: object
      required: [clientId]
      properties:
        clientId:
          type: string
        label:
          type: string

    ClientCalendarShare:
      type: object
      required:
        - id
        - clientId
        - shareToken
        - createdAt
      properties:
        id:
          type: string
        clientId:
          type: string
        shareToken:
          type: string
        label:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: ["string", "null"]
          format: date-time
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ─── User ─────────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, systemRole]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        systemRole:
          type: string
        department:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    UserInput:
      type: object
      required: [name, email, systemRole]
      properties:
        name:
          type: string
        email:
          type: string
        systemRole:
          type: string
        password:
          type: ["string", "null"]
        department:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        systemRole:
          type: string
        password:
          type: ["string", "null"]
        department:
          type: ["string", "null"]
        isActive:
          type: ["boolean", "null"]

    Client:
      type: object
      required: [id, companyName]
      properties:
        id:
          type: string
        companyName:
          type: string
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        health:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        serviceType:
          type: ["string", "null"]
        serviceDetails:
          type: ["string", "null"]
        socialHandles:
          type: ["string", "null"]
        websiteUrl:
          type: ["string", "null"]
        contentFrequency:
          type: ["string", "null"]
        targetAudience:
          type: ["string", "null"]

    ClientInput:
      type: object
      required: [companyName]
      properties:
        companyName:
          type: string
        contactPerson:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        category:
          type: ["string", "null"]
        health:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        serviceType:
          type: ["string", "null"]
        serviceDetails:
          type: ["string", "null"]
        socialHandles:
          type: ["string", "null"]
        websiteUrl:
          type: ["string", "null"]
        contentFrequency:
          type: ["string", "null"]
        targetAudience:
          type: ["string", "null"]
        platforms:
          type: ["string", "null"]
        socialGoals:
          type: ["string", "null"]
        contentTypes:
          type: ["string", "null"]
        websiteType:
          type: ["string", "null"]
        websiteFeatures:
          type: ["string", "null"]
        cmsPreference:
          type: ["string", "null"]
        budgetRange:
          type: ["string", "null"]

    Contract:
      type: object
      required: [id]
      properties:
        id:
          type: string
        title:
          type: ["string", "null"]
        status:
          type: ["string", "null"]
        value:
          type: ["number", "null"]
        startDate:
          type: ["string", "null"]
        endDate:
          type: ["string", "null"]

    Lead:
      type: object
      required: [id, title, stage]
      properties:
        id:
          type: string
        title:
          type: string
        stage:
          type: string
        companyName:
          type: ["string", "null"]
        contactName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        value:
          type: ["number", "null"]
        daysInStage:
          type: ["integer", "null"]

    LeadInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        stage:
          type: ["string", "null"]
        companyName:
          type: ["string", "null"]
        contactName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        value:
          type: ["number", "null"]

    PipelineStageSummary:
      type: object
      required: [stage]
      properties:
        stage:
          type: string
        count:
          type: ["integer", "null"]
        totalValue:
          type: ["number", "null"]

    Project:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        clientId:
          type: ["string", "null"]
        clientName:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        description:
          type: ["string", "null"]

    ProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        status:
          type: ["string", "null"]
        priority:
          type: ["string", "null"]
        clientId:
          type: ["string", "null"]
        startDate:
          type: ["string", "null"]
        dueDate:
          type: ["string", "null"]
        description:
          type: ["string", "null"]

    Task:
      type: object
      required: [id, title]
      properties:
        id:
          type: string
